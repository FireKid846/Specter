name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Test engine ────────────────────────────────────────────────────────────
  test:
    name: Test Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Clippy
        run: cargo clippy -p specter-engine -- -D warnings
        continue-on-error: true

      - name: Run unit tests
        run: cargo test -p specter-engine

      - name: Run perft depth 1
        run: cargo test perft_startpos_d1 -p specter-engine -- --nocapture

      - name: Run perft depth 2
        run: cargo test perft_startpos_d2 -p specter-engine -- --nocapture

      - name: Run perft depth 3
        run: cargo test perft_startpos_d3 -p specter-engine -- --nocapture

      - name: Run perft kiwipete depth 1
        run: cargo test perft_kiwipete_depth1 -p specter-engine -- --nocapture

      - name: Run perft kiwipete depth 2
        run: cargo test perft_kiwipete_depth2 -p specter-engine -- --nocapture

  # ─── Build CLI binary (all platforms) ───────────────────────────────────────
  build-cli:
    name: Build CLI — ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: specter-windows-x64.exe
            binary: specter.exe

          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: specter-linux-x64
            binary: specter

          - name: macOS x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: specter-macos-x64
            binary: specter

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p specter-cli --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  # ─── Build WASM ──────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build WASM
        run: |
          wasm-pack build packages/engine \
            --target web \
            --out-dir ../../packages/npm/wasm \
            --release \
            -- --features wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: specter-wasm
          path: packages/npm/wasm/
          retention-days: 7

  # ─── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    needs: [test, build-cli, build-wasm]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## Specter Engine Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests      | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Build  | ${{ needs.build-cli.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WASM Build | ${{ needs.build-wasm.result }} |" >> $GITHUB_STEP_SUMMARY
