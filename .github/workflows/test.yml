name: Quick Test

on:
  pull_request:
    paths:
      - 'packages/engine/**'

jobs:
  perft:
    name: Perft Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Perft depth 1–3 (startpos)
        run: |
          cargo test perft_startpos_d1 -p specter-engine --release -- --nocapture
          cargo test perft_startpos_d2 -p specter-engine --release -- --nocapture
          cargo test perft_startpos_d3 -p specter-engine --release -- --nocapture

      - name: Perft Kiwipete
        run: |
          cargo test perft_kiwipete_depth1 -p specter-engine --release -- --nocapture
          cargo test perft_kiwipete_depth2 -p specter-engine --release -- --nocapture
