name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test -p specter-engine

      - name: Perft validation (startpos)
        run: |
          cargo test perft_startpos_depth1 -p specter-engine -- --nocapture
          cargo test perft_startpos_depth2 -p specter-engine -- --nocapture
          cargo test perft_startpos_depth3 -p specter-engine -- --nocapture

      - name: Perft validation (kiwipete)
        run: |
          cargo test perft_kiwipete_depth1 -p specter-engine -- --nocapture
          cargo test perft_kiwipete_depth2 -p specter-engine -- --nocapture

  # ─── 2a. Build CLI binaries ─────────────────────────────────────────────────
  build-cli:
    name: Build CLI — ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: specter-windows-x64.exe
            binary: specter.exe

          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: specter-linux-x64
            binary: specter

          - name: macOS x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: specter-macos-x64
            binary: specter

          - name: macOS ARM
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: specter-macos-arm64
            binary: specter

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p specter-cli --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ─── 2b. Build WASM ─────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build WASM
        run: |
          wasm-pack build packages/engine \
            --target web \
            --out-dir ../../packages/npm/wasm \
            --release \
            -- --features wasm

      - name: Package WASM
        run: |
          cd packages/npm/wasm
          zip -r ../../../specter-wasm.zip .

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: specter-wasm
          path: specter-wasm.zip

  # ─── 3. Publish GitHub Release ──────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-cli, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Specter Engine ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Specter Engine ${{ github.ref_name }}

            ### UCI Binaries

            | Platform | File |
            |----------|------|
            | Windows x64 | `specter-windows-x64.exe` |
            | Linux x64   | `specter-linux-x64`       |
            | macOS x64   | `specter-macos-x64`       |
            | macOS ARM   | `specter-macos-arm64`     |

            ### WASM Package

            `specter-wasm.zip` — drop into your web project (built with `wasm-pack --target web`).

            ### Quick test
            ```
            ./specter-linux-x64
            uci
            isready
            position startpos moves e2e4
            go movetime 1000
            ```
          files: |
            artifacts/specter-windows-x64.exe/specter-windows-x64.exe
            artifacts/specter-linux-x64/specter-linux-x64
            artifacts/specter-macos-x64/specter-macos-x64
            artifacts/specter-macos-arm64/specter-macos-arm64
            artifacts/specter-wasm/specter-wasm.zip
