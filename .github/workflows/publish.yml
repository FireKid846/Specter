name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3)'
        required: true
        type: string
      nnue_url:
        description: 'Direct download URL for specter.nnue (optional — leave blank to use existing or HCE)'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  # ─── 0. Embed NNUE (optional) ────────────────────────────────────────────────
  # Only runs when nnue_url input is provided.
  # Downloads the .nnue file, validates it, commits it to the repo,
  # and uploads it as an artifact for the build jobs to pick up.
  embed-nnue:
    name: Embed NNUE Network
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.nnue_url != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download specter.nnue
        run: |
          curl -L "${{ github.event.inputs.nnue_url }}" -o specter.nnue
          ls -lh specter.nnue

      - name: Validate file size
        run: |
          SIZE=$(wc -c < specter.nnue)
          EXPECTED=1573634
          echo "File size: $SIZE bytes / Expected: $EXPECTED bytes"
          if [ "$SIZE" -ne "$EXPECTED" ]; then
            echo "WARNING: size mismatch — check Bullet output format"
          else
            echo "Size check PASSED"
          fi

      - name: Place in engine source
        run: cp specter.nnue packages/engine/src/eval/nnue/specter.nnue

      - name: Commit to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/engine/src/eval/nnue/specter.nnue
          git commit -m "embed: trained NNUE weights ${{ env.RELEASE_VERSION }}" || echo "Nothing to commit"
          git push

      - name: Upload .nnue artifact for build jobs
        uses: actions/upload-artifact@v4
        with:
          name: specter-nnue-file
          path: packages/engine/src/eval/nnue/specter.nnue

  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test Engine
    runs-on: ubuntu-latest
    needs: [embed-nnue]
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test -p specter-engine

      - name: Perft validation (startpos)
        run: |
          cargo test perft_startpos_depth1 -p specter-engine -- --nocapture
          cargo test perft_startpos_depth2 -p specter-engine -- --nocapture
          cargo test perft_startpos_depth3 -p specter-engine -- --nocapture

      - name: Perft validation (kiwipete)
        run: |
          cargo test perft_kiwipete_depth1 -p specter-engine -- --nocapture
          cargo test perft_kiwipete_depth2 -p specter-engine -- --nocapture

  # ─── 2a. Build CLI binaries ─────────────────────────────────────────────────
  build-cli:
    name: Build CLI — ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: specter-windows-x64.exe
            binary: specter.exe

          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: specter-linux-x64
            binary: specter

          - name: macOS x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: specter-macos-x64
            binary: specter

          - name: macOS ARM
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: specter-macos-arm64
            binary: specter

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      # If nnue_url was provided, download the .nnue artifact from embed-nnue job
      - name: Download .nnue artifact (if NNUE embed run)
        if: ${{ github.event.inputs.nnue_url != '' }}
        uses: actions/download-artifact@v4
        with:
          name: specter-nnue-file
          path: packages/engine/src/eval/nnue/

      # Detect .nnue — either just downloaded, or already committed in repo
      - name: Detect NNUE
        id: nnue
        shell: bash
        run: |
          if [ -f "packages/engine/src/eval/nnue/specter.nnue" ]; then
            echo "features=--features nnue" >> $GITHUB_OUTPUT
            echo "label=NNUE" >> $GITHUB_OUTPUT
            echo "NNUE found — building with NNUE"
          else
            echo "features=" >> $GITHUB_OUTPUT
            echo "label=HCE" >> $GITHUB_OUTPUT
            echo "No NNUE — building with HCE fallback"
          fi

      - name: Build CLI
        run: cargo build --release -p specter-cli --target ${{ matrix.target }} ${{ steps.nnue.outputs.features }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ─── 2b. Build WASM ─────────────────────────────────────────────────────────
  # Always HCE — .nnue is too large for web delivery
  build-wasm:
    name: Build WASM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build WASM
        run: |
          wasm-pack build packages/engine \
            --target web \
            --out-dir ../../packages/npm/wasm \
            --release \
            -- --features wasm

      - name: Package WASM
        run: |
          cd packages/npm/wasm
          zip -r ../../../specter-wasm.zip .

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: specter-wasm
          path: specter-wasm.zip

  # ─── 3. Publish GitHub Release ──────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-cli, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Detect NNUE label
        id: nnue
        run: |
          if [ -f "packages/engine/src/eval/nnue/specter.nnue" ]; then
            echo "label=NNUE" >> $GITHUB_OUTPUT
          else
            echo "label=HCE" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "Specter Engine ${{ env.RELEASE_VERSION }} [${{ steps.nnue.outputs.label }}]"
          generate_release_notes: true
          body: |
            ## Specter Engine ${{ env.RELEASE_VERSION }}

            **Eval:** ${{ steps.nnue.outputs.label == 'NNUE' && 'NNUE (trained network embedded)' || 'Hand-crafted eval (HCE)' }}

            ### UCI Binaries

            | Platform | File |
            |----------|------|
            | Windows x64 | `specter-windows-x64.exe` |
            | Linux x64   | `specter-linux-x64`       |
            | macOS x64   | `specter-macos-x64`       |
            | macOS ARM   | `specter-macos-arm64`     |

            ### WASM Package

            `specter-wasm.zip` — built with `wasm-pack --target web`. Always uses HCE.

            ### Quick test
            ```
            ./specter-linux-x64
            uci
            isready
            position startpos moves e2e4
            go movetime 1000
            ```
          files: |
            artifacts/specter-windows-x64.exe/specter-windows-x64.exe
            artifacts/specter-linux-x64/specter-linux-x64
            artifacts/specter-macos-x64/specter-macos-x64
            artifacts/specter-macos-arm64/specter-macos-arm64
            artifacts/specter-wasm/specter-wasm.zip
