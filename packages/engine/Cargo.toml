[package]
name = "specter-engine"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Specter Chess Engine — core library"

[lib]
name = "specter"
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = { version = "0.2", optional = true }
js-sys       = { version = "0.3", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = []
wasm    = ["wasm-bindgen", "js-sys"]
# Enable to embed a trained .nnue file at compile time.
# Place the file at: packages/engine/src/eval/nnue/specter.nnue
nnue    = []

[[bench]]
name = "search_bench"
harness = false

[[bench]]
name = "movegen_bench"
harness = false
