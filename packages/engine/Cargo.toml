[package]
name = "specter-engine"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Specter Chess Engine — core library"

[lib]
name = "specter"
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = { version = "0.2", optional = true }
js-sys       = { version = "0.3", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = []
wasm       = ["wasm-bindgen", "js-sys"]
# Compile NNUE evaluation code (safe without a .nnue file — falls back to HCE)
nnue       = []
# Embed the .nnue weights file at compile time (requires specter.nnue to exist)
# Usage: cargo build --release --features nnue,nnue_embed
nnue_embed = []

[[bench]]
name = "search_bench"
harness = false

[[bench]]
name = "movegen_bench"
harness = false
