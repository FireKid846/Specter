name            = "specter-api"
main            = "src/index.ts"
compatibility_date = "2024-01-01"

[ai]
binding = "AI"

[[kv_namespaces]]
binding  = "PUZZLES_KV"
id       = "your-kv-namespace-id"

[[d1_databases]]
binding  = "DB"
database_name = "specter-db"
database_id   = "your-d1-database-id"

[vars]
ENVIRONMENT = "production"
